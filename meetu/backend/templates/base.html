{% load socialaccount %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gachi - 캠퍼스 익명 활동 매칭</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    {% block styles %}{% endblock %}
    <style>
        :root {
            --bg-color: #0A0A0F;
            --surface-color: #111118;
            --border-color: rgba(255,255,255,0.07);
            --primary: #4F46E5;
            --secondary: #06B6D4;
        }
        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .surface {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
        }
        /* Custom glow effects for CTA */
        .btn-glow {
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
            transition: all 0.2s ease-in-out;
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.6);
        }
        /* Grid background pattern */
        .bg-pattern {
            background-image: linear-gradient(rgba(79,70,229,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(79,70,229,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 backdrop-blur-md bg-[#0A0A0F]/80 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-black tracking-tighter text-white">Gachi<span class="text-indigo-500">.</span></a>
                </div>
                <div>
                    {% if user.is_authenticated %}
                        <a href="{% url 'meeting_list' %}" class="text-sm font-medium text-gray-300 hover:text-white mr-4">모임 목록</a>
                        <a href="{% url 'profile' %}" class="text-sm font-medium text-gray-300 hover:text-white mr-4">내 프로필</a>
                        <form method="post" action="{% url 'account_logout' %}" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="text-sm font-medium text-gray-300 hover:text-white">로그아웃</button>
                        </form>
                    {% else %}
                        <a href="{% provider_login_url 'google' %}" class="px-4 py-2 text-sm font-medium rounded-md bg-indigo-600 text-white btn-glow">Google로 시작하기</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
            <p class="text-center text-sm text-gray-500">&copy; 2026 Gachi. All rights reserved.</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
